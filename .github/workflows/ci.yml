name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Sync dependencies (lockfile)
        run: uv sync --extra dev --frozen

      - name: Ruff (tests)
        run: uv run ruff check tests

      - name: Pytest
        run: uv run pytest tests/ -v --tb=short --no-cov

      - name: Quality soft gate (deterministic)
        run: uv run python tests/quality_gate.py
